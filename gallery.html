<style>
        body {
            margin: 0;

            /* Background Image */
            background-image: url('https://i.pinimg.com/736x/4b/f0/17/4bf0177312b71a4986ff2551710554a0.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: white;
        }

        /* Overlay for readability */
        .overlay {
            background-color: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            padding: 20px;
        }

        /* Navigation bar */
        nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0,0,0,0.7);
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        /* Search box */
        .search-box {
            text-align: center;
            margin: 20px;
        }

        .search-box input {
            padding: 10px;
            width: 50%;
        }

        /* Heading */
        h1 {
            text-align: center;
        }

        /* Paragraph */
        .content {
            text-align: center;
            max-width: 700px;
            margin: auto;
        }

        /* Images section */
        .images {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }

        .images img {
            width: 150px;
            height: 150px;
            border-radius: 10px;
        }

        /* Videos */
        .videos {
            display: flex;
            justify-content: space-around;
            margin: 20px;
        }

        /* Tables */
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            color: black;
        }

        table, th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
