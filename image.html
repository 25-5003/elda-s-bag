<!DOCTYPE html>
<html>
<head>
    <title>Elda's Bag Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Body */
        body {
            font-family: Arial, sans-serif;
            background: #ffe6f2;
            margin: 0;
            padding: 0;
            justify-content: center;
        }

        /* Container */
        .container {
            width: 90%;
            margin: auto;
        }

        /* Header */
        header {
            background: #ff66b2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Search bar */
        .search-box {
            margin-top: 10px;
        }

        .search-box input {
            padding: 8px;
            width: 200px;
        }

        .search-box button {
            padding: 8px;
            background: #ff1493;
            color: white;
            border: none;
        }

        /* Navigation */
        nav {
            background: #ff99cc;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        /* Sections */
        .section {
            padding: 20px;
            background: white;
            margin-top: 10px;
        }

        /* Headings */
        h1 { color: #ff1493; }
        h2 { color: #ff69b4; }
        h3 { color: #c71585; }
        h4 { color: #d6336c; }

        /* Paragraphs */
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        /* Gallery images */
        .gallery img {
            width: 180px;
            margin: 10px;
            border-radius: 10px;
        }

        /* Videos */
        .videos iframe {
            margin: 10px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table, th, td {
            border: 1px solid #ff1493;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        /* Footer */
        footer {
            background: #ff66b2;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
  <body>
    <h2>Bag Gallery</h2>
        <div class="gallery-row">

    <div class="img-box">
      <img width="250" height="150" src="https://www.tannerbates.co.uk/cdn/shop/files/mini-baja-front-tan_4f65f3fa-6eaa-4c45-8b9b-686667d7e411_600x.jpg?v=1708568630" alt="Leather Bag">
      <h3>Leather Bag</h3>
    </div>

    <div class="img-box">
      <img width="250" height="150" src="https://hips.hearstapps.com/vader-prod.s3.amazonaws.com/1719934853-1684523718-jansport-adaptive-66841f7397a9e.png?crop=0.913xw:0.913xh;0.0288xw,0.0321xh&resize=980:*" alt="Backpack">
      <h3>Backpack</h3>
    </div>

    <div class="img-box">
      <img width="250" height="150" src="https://www.maorimoana.co.nz/cdn/shop/files/MAORITRAVELBAG.png?v=1735594089&width=1080" alt="Travel Bag">
      <h3>Travel Bag</h3>
    </div>
        </div>
    

    <!-- Videos -->
    <div class="section videos">
        <h2>Bag Videos</h2>
        <iframe width="250" height="150" src="https://www.youtube.com/embed/tgbNymZ7vqY""></iframe>
        <iframe width="250" height="150" src="https://www.youtube.com/embed/tgbNymZ7vqY"></iframe>
        <iframe width="250" height="150" src="https://www.youtube.com/embed/aqz-KE-bpKQ"></iframe>
        <iframe width="250" height="150" src="https://www.youtube.com/embed/kXYiU_JCYtU"></iframe>
        <iframe width="250" height="150" src="https://www.youtube.com/embed/1roy4o4tqQM"></iframe>
    </div>

  </body>
</html>
