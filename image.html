<!DOCTYPE html>
<html>
<head>
    <title>Elda's Bag Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Body */
        body {
            font-family: Arial, sans-serif;
            background: #ffe6f2;
            margin: 0;
            padding: 0;
            justify-content: center;
        }

        /* Container */
        .container {
            width: 90%;
            margin: auto;
        }

        /* Header */
        header {
            background: #ff66b2;
            color: white;
            padding: 20px;
            text-align: center;
        }

        /* Search bar */
        .search-box {
            margin-top: 10px;
        }

        .search-box input {
            padding: 8px;
            width: 200px;
        }

        .search-box button {
            padding: 8px;
            background: #ff1493;
            color: white;
            border: none;
        }

        /* Navigation */
        nav {
            background: #ff99cc;
            padding: 10px;
            text-align: center;
        }

        nav a {
            margin: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }

        /* Sections */
        .section {
            padding: 20px;
            background: white;
            margin-top: 10px;
        }

        /* Headings */
        h1 { color: #ff1493; }
        h2 { color: #ff69b4; }
        h3 { color: #c71585; }
        h4 { color: #d6336c; }

        /* Paragraphs */
        p {
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        /* Gallery images */
        .gallery img {
            width: 180px;
            margin: 10px;
            border-radius: 10px;
        }

        /* Videos */
        .videos iframe {
            margin: 10px;
        }

        /* Table */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        table, th, td {
            border: 1px solid #ff1493;
        }

        th, td {
            padding: 8px;
            text-align: center;
        }

        /* Footer */
        footer {
            background: #ff66b2;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>

  </body>
