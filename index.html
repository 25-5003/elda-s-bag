<!DOCTYPE html>
<html>
<head>
<title>Elda's Bag Store</title>

<style>

/* BODY */
body {
      background-image: https://i.pinimg.com/1200x/25/f4/3a/25f43a44931691da17a3c48147be9f1c.jpg ; /* Path to your image */
      background-size: cover; /* Makes the image cover the whole page */
      background-repeat: no-repeat; /* Prevents tiling */
      background-position: center; /* Centers the image */
    }
body{
font-family: Arial, sans-serif;
background:#ffe6f2;
margin:0;
padding:0;
}

/* CONTAINER */
.container{
width:90%;
margin:auto;
}

/* HEADER */
#main-header{
background:#ff66b2;
color:white;
padding:20px;
text-align:center;
border-bottom:4px solid #ff1493;
}

/* SEARCH */
.search-box input{
padding:8px;
width:200px;
}

.search-box button{
padding:8px;
background:#ff1493;
color:white;
border:none;
}

/* NAVIGATION */
#menu-bar{
background:#ff99cc;
padding:10px;
text-align:center;
}

#menu-bar a{
margin:15px;
text-decoration:none;
color:white;
font-weight:bold;
}

#menu-bar a:hover{
background:white;
color:#ff1493;
padding:5px;
border-radius:5px;
}

/* SECTION */
.section{
background:white;
padding:20px;
margin-top:15px;
}

/* HEADINGS */
h1{color:white;}
h2{color:#ff1493;}
h3{color:#c71585;}
h4{color:#d6336c;}

/* PARAGRAPHS */
p{
font-size:16px;
line-height:1.6;
color:#333;
}

/* 2 COLUMN LAYOUT */
.row{
display:flex;
flex-wrap:wrap;
}

.column{
flex:50%;
padding:10px;
}
 

/* Make images fit nicely */
img {
    width: 100%;
    height: auto;
}

/* Make videos same size */
iframe {
    width: 100%;
    height: 200px;
}

/* IMAGES */
.gallery-row{
display:flex;
gap:15px;
flex-wrap:wrap;
justify-content:center;
}

.img-box{
text-align:center;
}

.img-box img{
border-radius:10px;
}

 /* ===================== GALLERY ===================== */
.gallery {
  padding: 2rem;
}

.gallery h2 {
  color: #ff6f61;
}

.gallery-row {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

.img-box {
  width: 200px;
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.img-box img {
  width: 100%;
  border-radius: 8px;
}

/* VIDEOS */
#videos{
text-align:center;
}

iframe{
margin:10px;
}
 /* VIDEO CONTAINER */

.video-container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
margin-top:15px;
}

.video-box{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
} 

/* TABLE */
table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

table,th,td{
border:1px solid #ff1493;
}

th,td{
padding:8px;
text-align:center;
}

/* FOOTER */
#main-footer{
background:#ff66b2;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>
</head>
